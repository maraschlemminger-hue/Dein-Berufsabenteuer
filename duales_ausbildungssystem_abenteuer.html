<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dein erster Tag – Ein Berufsabenteuer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #f5a623;
    --accent2: #4fc3f7;
    --accent3: #a8e063;
    --accent-red: #ef5350;
    --text: #e8eaf0;
    --text-muted: #8892aa;
    --border: #2e3354;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(245,166,35,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(79,195,247,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text-muted); font-weight: 400; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .progress-bar {
    width: 120px;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* Scene container */
  .scene {
    animation: fadeUp 0.45s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Chapter label */
  .chapter-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.25);
    padding: 5px 12px;
    border-radius: 99px;
    margin-bottom: 18px;
  }

  /* Main story text card */
  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 36px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .story-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .story-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.55rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .story-text p { margin-bottom: 14px; color: var(--text); }
  .story-text p:last-child { margin-bottom: 0; }

  /* Info box */
  .info-box {
    background: rgba(79,195,247,0.08);
    border: 1px solid rgba(79,195,247,0.25);
    border-left: 3px solid var(--accent2);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin: 20px 0;
    font-size: 0.93rem;
  }
  .info-box strong {
    display: block;
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Decision cards grid */
  .decision-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .choices {
    display: grid;
    gap: 12px;
  }
  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    text-align: left;
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .choice-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(245,166,35,0.07), transparent);
    opacity: 0;
    transition: opacity 0.22s;
  }
  .choice-btn:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:active { transform: translateY(0); }
  .choice-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--accent);
    margin-top: 1px;
    transition: background 0.2s;
  }
  .choice-btn:hover .choice-letter {
    background: rgba(245,166,35,0.2);
  }

  /* Feedback box */
  .feedback-box {
    border-radius: var(--radius);
    padding: 22px 26px;
    margin: 22px 0;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .feedback-box.correct {
    background: rgba(168,224,99,0.09);
    border: 1.5px solid rgba(168,224,99,0.3);
  }
  .feedback-box.wrong {
    background: rgba(239,83,80,0.09);
    border: 1.5px solid rgba(239,83,80,0.3);
  }
  .feedback-box.neutral {
    background: rgba(245,166,35,0.09);
    border: 1.5px solid rgba(245,166,35,0.3);
  }
  .feedback-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .feedback-text strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }
  .feedback-box.correct strong { color: var(--accent3); }
  .feedback-box.wrong strong { color: var(--accent-red); }
  .feedback-box.neutral strong { color: var(--accent); }

  /* Score badge */
  .score-display {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 20px;
  }

  /* Continue button */
  .btn-continue {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #0f1117;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 18px;
  }
  .btn-continue:hover {
    background: #ffc04d;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(245,166,35,0.35);
  }
  .btn-restart {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-restart:hover {
    background: var(--surface);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  /* Summary / finale */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 22px 0;
  }
  .summary-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
  }
  .summary-item .label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    margin-bottom: 5px;
  }
  .summary-item .value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--accent);
  }

  .key-facts {
    list-style: none;
    margin: 14px 0;
  }
  .key-facts li {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }
  .key-facts li:last-child { border-bottom: none; }
  .key-facts li::before {
    content: '▸';
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .reflection-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 20px 24px;
    margin-top: 24px;
    font-style: italic;
    color: var(--text-muted);
  }
  .reflection-box strong {
    display: block;
    color: var(--text);
    font-style: normal;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Quiz styles */
  .quiz-option {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 18px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.96rem;
  }
  .quiz-option:hover:not(.disabled) {
    border-color: var(--accent2);
    background: rgba(79,195,247,0.07);
  }
  .quiz-option.correct-ans {
    border-color: var(--accent3);
    background: rgba(168,224,99,0.1);
    color: var(--accent3);
  }
  .quiz-option.wrong-ans {
    border-color: var(--accent-red);
    background: rgba(239,83,80,0.1);
    color: var(--accent-red);
  }
  .quiz-option.disabled { cursor: default; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .story-card { padding: 22px 20px; }
    .story-title { font-size: 1.25rem; }
    .summary-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

</div>

const scenes = [

// ─── RENDER ENGINE ──────────────────────────────────────────────────────────

function renderScene(s) {
  const container = document.getElementById('scene-container');
  document.getElementById('progress-fill').style.width = s.progress + '%';
  document.getElementById('progress-text').textContent = s.chapter || `Szene ${s.id + 1}`;

  let html = `<div class="scene">`;
  html += `<div class="chapter-label">${s.chapter}</div>`;
  html += `<div class="story-card">`;
  html += `<h1 class="story-title">${s.title}</h1>`;
  html += `<div class="story-text">${s.content}</div>`;

  // Message box (intro)
  if (s.messageBox) {
    html += `<div class="info-box" style="border-left-color:var(--accent); background:rgba(245,166,35,0.08); border-color:rgba(245,166,35,0.3);">
      <strong>💬 ${s.messageBox.sender}</strong>
      ${s.messageBox.text}
    </div>`;
  }

  if (s.extra) html += `<div class="story-text">${s.extra}</div>`;

  // Info box
  if (s.infoBox) {
    html += `<div class="info-box"><strong>${s.infoBox.label}</strong>${s.infoBox.text}</div>`;
  }

  // Key facts (finale)
  if (s.keyFacts) {
    html += `<ul class="key-facts">`;
    s.keyFacts.forEach(f => html += `<li>${f}</li>`);
    html += `</ul>`;
  }

  // Score display
  if (s.type === 'finale') {
    const pct = state.totalDecisions > 0 ? Math.round((state.score / state.totalDecisions) * 100) : 0;
    let medal = pct >= 80 ? '🥇 Ausgezeichnet!' : pct >= 50 ? '🥈 Gut gemacht!' : '🥉 Weiter üben!';
    html += `<hr class="divider">
    <div class="summary-grid">
      <div class="summary-item"><div class="label">Richtige Antworten</div><div class="value">${state.score} / ${state.totalDecisions}</div></div>
      <div class="summary-item"><div class="label">Trefferquote</div><div class="value">${pct}%</div></div>
    </div>
    <div class="score-display">🏆 ${medal}</div>`;
  }

  html += `</div>`; // close story-card

  // Choices (decision)
  if (s.type === 'decision') {
    html += `<div class="decision-label">🗺 Welche Entscheidung triffst du?</div>`;
    html += `<div class="choices" id="choices">`;
    s.choices.forEach((c, i) => {
      html += `<button class="choice-btn" onclick="handleDecision(${s.id}, ${i})">
        <span class="choice-letter">${c.letter}</span>
        <span>${c.text}</span>
      </button>`;
    });
    html += `</div>`;
  }

  // Quiz
  if (s.type === 'quiz') {
    html += `<div class="decision-label">❓ Welche Aussage ist richtig?</div>`;
    html += `<div id="choices">`;
    s.choices.forEach((c, i) => {
      html += `<div class="quiz-option" id="opt-${i}" onclick="handleQuiz(${s.id}, ${i})">
        <span class="choice-letter">${c.letter}</span>
        ${c.text}
      </div>`;
    });
    html += `</div>`;
  }

  // Continue / Restart buttons
  if (s.type === 'story') {
    html += `<button class="btn-continue" onclick="goToScene(${s.next})">${s.btn || 'Weiter →'}</button>`;
  }

  if (s.type === 'finale') {
    html += `<div class="reflection-box">
      <strong>💭 Reflexionsfrage</strong>
      ${s.reflection}
    </div>`;
    html += `<div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:20px;">
      <button class="btn-continue btn-restart" onclick="restartGame()">🔄 Nochmal spielen</button>
    </div>`;
  }

  html += `</div>`; // close scene
  container.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleDecision(sceneId, choiceIdx) {
  const s = scenes[sceneId];
  const choice = s.choices[choiceIdx];
  state.totalDecisions++;
  if (choice.correct) state.score++;

  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.onclick = null;
    b.style.opacity = '0.5';
  });

  // Highlight chosen
  const btns = document.querySelectorAll('.choice-btn');
  btns[choiceIdx].style.opacity = '1';
  btns[choiceIdx].style.borderColor = choice.correct ? 'var(--accent3)' : 'var(--accent-red)';

  // Show feedback
  const fb = choice.feedback;
  const fbIcon = fb.type === 'correct' ? '✅' : fb.type === 'wrong' ? '❌' : '💡';
  const fbEl = document.createElement('div');
  fbEl.className = `feedback-box ${fb.type}`;
  fbEl.innerHTML = `<div class="feedback-icon">${fbIcon}</div>
    <div class="feedback-text">
      <strong>${fb.title}</strong>
      ${fb.text}
    </div>`;
  document.getElementById('choices').after(fbEl);

  // Add continue button
  const btn = document.createElement('button');
  btn.className = 'btn-continue';
  btn.innerHTML = 'Weiter →';
  btn.onclick = () => goToScene(s.next);
  fbEl.after(btn);
}

function handleQuiz(sceneId, choiceIdx) {
  const s = scenes[sceneId];
  const choice = s.choices[choiceIdx];
  state.totalDecisions++;

  // Disable all
  document.querySelectorAll('.quiz-option').forEach(el => {
    el.onclick = null;
    el.classList.add('disabled');
  });

  // Highlight correct and chosen
  s.choices.forEach((c, i) => {
    const el = document.getElementById(`opt-${i}`);
    if (c.correct) el.classList.add('correct-ans');
    else if (i === choiceIdx && !c.correct) el.classList.add('wrong-ans');
  });

  if (choice.correct) state.score++;

  const fb = choice.correct ? s.feedback.correct : s.feedback.wrong;
  const fbIcon = choice.correct ? '✅' : '❌';
  const fbEl = document.createElement('div');
  fbEl.className = `feedback-box ${fb.type}`;
  fbEl.innerHTML = `<div class="feedback-icon">${fbIcon}</div>
    <div class="feedback-text">
      <strong>${fb.title}</strong>
      ${fb.text}
    </div>`;
  document.getElementById('choices').after(fbEl);

  const btn = document.createElement('button');
  btn.className = 'btn-continue';
  btn.innerHTML = 'Weiter →';
  btn.onclick = () => goToScene(s.next);
  fbEl.after(btn);
}

function goToScene(id) {
  state.scene = id;
  renderScene(scenes[id]);
}

function restartGame() {
  state = { scene: 0, score: 0, totalDecisions: 0, path: [] };
  renderScene(scenes[0]);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderScene(scenes[0]);
</script>
